<style>
    /* 1. Reset the entire page canvas */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background-color: #1a1a1a; }

    /* 2. The Container */
    .room-bg {
        width: 100vw;
        height: 100vh;
        /* We remove the ./ and just use the name */
        background-image: url('room1.png'); 
        background-position: center center;
        background-repeat: no-repeat;
        background-size: cover;
        position: relative;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    /* 3. A visible message so we know the code is running */
    .status-check {
        color: white;
        background: rgba(0,0,0,0.7);
        padding: 20px;
        border: 2px solid #00ff41;
        font-family: monospace;
    }
</style>

<body>
    <div class="room-bg">
        <div class="status-check">
            <h3>DIAGNOSTIC MODE</h3>
            <p>If you see this box but the background is BLACK, <br>
            the browser cannot find <b>room1.png</b>.</p>
        </div>
    </div>
</body>
