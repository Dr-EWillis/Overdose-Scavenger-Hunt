
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calibration Mode</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; }
        /* CHANGE THE NAME BELOW TO YOUR FILE NAME */
        .room { 
            position: relative; width: 100vw; height: 100vh; 
            background: url(room1.png) no-repeat center center; 
            background-size: cover; 
            cursor: crosshair;
        }
        #coords {
            position: absolute; top: 10px; right: 10px;
            background: rgba(0,0,0,0.8); color: yellow;
            padding: 15px; font-family: monospace; border: 2px solid yellow;
            z-index: 1000; pointer-events: none;
        }
    </style>
</head>
<body>

<div id="coords">Click anywhere to get coordinates!</div>
<div class="room" onclick="getCoords(event)"></div>

<script>
    function getCoords(event) {
        const x = Math.round((event.pageX / window.innerWidth) * 100);
        const y = Math.round((event.pageY / window.innerHeight) * 100);
        document.getElementById('coords').innerHTML = 
            `TOP: ${y}% <br> LEFT: ${x}% <br><br> (Use these for your hotspots!)`;
    }
</script>

</body>
</html>
