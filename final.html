<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FINAL DEBRIEF: System Activation</title>
    <style>
        * { box-sizing: border-box; }
        
        /* 1. ALLOW SCROLLING: Essential when the cipher section expands the box */
        body, html { 
            margin: 0; padding: 0; min-height: 100%; width: 100%; 
            background-color: #000; font-family: 'Courier New', Courier, monospace; 
            color: #00ff41; overflow-y: auto; 
        }

        .final-container {
            width: 100%;
            min-height: 100vh;
            background-image: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('final.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed; /* Keeps background steady while scrolling */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }

        .terminal-box {
            background: rgba(0, 20, 0, 0.95);
            border: 2px solid #00ff41;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(0, 255, 65, 0.4);
            max-width: 600px;
            width: 100%;
            margin: 20px 0;
            transition: all 0.5s ease;
        }

        h1 { font-size: 1.3rem; text-shadow: 0 0 10px #00ff41; margin-bottom: 20px; }
        p { color: #fff; font-family: sans-serif; line-height: 1.5; font-size: 0.95rem; }
        
        .pillar-inputs { display: grid; grid-template-columns: 1fr; gap: 10px; margin: 20px 0; }
        input { 
            background: #000; border: 1px solid #00ff41; color: #00ff41; 
            padding: 12px; text-align: center; font-size: 1.1rem; 
            text-transform: uppercase; border-radius: 5px; width: 100%; 
        }
        
        button { 
            background: #00ff41; color: #000; border: none; 
            padding: 15px 30px; font-weight: bold; cursor: pointer; 
            border-radius: 5px; margin-top: 10px; font-size: 1rem; 
            transition: 0.3s;
        }
        button:hover { background: #fff; box-shadow: 0 0 15px #fff; }

        /* CIPHER SECTION (HIDDEN BY DEFAULT) */
        #cipher-section { display: none; border-top: 2px dashed #00ff41; margin-top: 30px; padding-top: 20px; animation: fadeIn 1s; }
        
        .cipher-text { 
            font-size: 1.8rem; letter-spacing: 8px; font-weight: bold; 
            color: #ff3e3e; margin: 20px 0; word-break: break-all;
            text-shadow: 0 0 5px #ff3e3e;
        }
        
        #victory-screen { display: none; color: #fff; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* 2. MOBILE SPECIFIC TWEAKS */
        @media (max-width: 480px) {
            .terminal-box { padding: 20px; }
            h1 { font-size: 1.1rem; }
            p { font-size: 0.85rem; }
            .cipher-text { font-size: 1.3rem; letter-spacing: 4px; }
            #victory-screen h1 { font-size: 2rem !important; }
        }
    </style>
</head>
<body>

<div class="final-container">
    <div class="terminal-box" id="main-terminal">
        <h1>[COMMAND_LEVEL_ACCESS_REQUIRED]</h1>
        <p>To initialize the 2026 Protocol, enter the three Pillar Words discovered during your investigation.</p>

        <div class="pillar-inputs">
            <input type="text" id="p1" placeholder="PILLAR 1 (ROOM 1)">
            <input type="text" id="p2" placeholder="PILLAR 2 (ROOM 2)">
            <input type="text" id="p3" placeholder="PILLAR 3 (ROOM 3)">
        </div>

        <button onclick="verifyPillars()">INITIALIZE SYSTEM</button>

        <div id="cipher-section">
            <h2 style="color: #ff3e3e;">[SYSTEM_ENCRYPTED]</h2>
            <p>The Master Key is scrambled. Shift the sequence <strong>BACKWARD</strong> in the alphabet by the total number of rooms you have conquered (3).</p>
            
            <div class="cipher-text">UHVLOLHQFH</div>
            
            <input type="text" id="masterKey" placeholder="DECRYPTED KEY...">
            <br>
            <button onclick="verifyFinal()">ACTIVATE PROTOCOL</button>
        </div>
